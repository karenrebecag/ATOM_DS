name: Sync Figma Variables

on:
  # Run every 6 hours (adjust as needed)
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Sync Figma Variables
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: |
          node scripts/sync-figma-api.js

      - name: Check for changes
        id: git-check
        run: |
          git add packages/tokens/src/figma
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected"
            git diff --cached --stat
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(tokens): sync figma variables

            Auto-synced from Figma at ${{ github.run_id }}

            Files synced:
            - Primitives (lMdHweWx8ENQuxBv4p0Hin)
            - Semantics (YkhUvpl8Yfm7lK5yv6WOp8)
          branch: figma-sync-${{ github.run_number }}
          delete-branch: true
          title: 'chore(tokens): sync figma variables'
          body: |
            ## 🎨 Figma Variables Sync

            Auto-generated PR from scheduled Figma sync.

            ### Files Updated
            - `packages/tokens/src/figma/primitives/*.json`
            - `packages/tokens/src/figma/semantics/*.json`

            ### Source
            - **Primitives:** https://www.figma.com/design/lMdHweWx8ENQuxBv4p0Hin/Primitives
            - **Semantics:** https://www.figma.com/design/YkhUvpl8Yfm7lK5yv6WOp8/Semantics

            ### Next Steps
            1. Review changes below
            2. Merge if everything looks correct
            3. Tokens will auto-build after merge

            ---
            🤖 Generated by GitHub Actions
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          labels: |
            figma-sync
            automated
            tokens

      - name: Summary
        if: steps.git-check.outputs.changed == 'true'
        run: |
          echo "## ✅ Figma Sync Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Created PR with Figma variable updates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed files:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --cached --stat packages/tokens/src/figma >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: No changes summary
        if: steps.git-check.outputs.changed == 'false'
        run: |
          echo "## ℹ️  No Changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Figma variables are already up to date" >> $GITHUB_STEP_SUMMARY
